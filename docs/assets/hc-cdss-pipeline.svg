<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a90d9"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f5a623"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4caf50"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="680" fill="#f8f9fa" rx="6"/>
  <rect width="1000" height="680" fill="none" stroke="#dde3ea" stroke-width="1" rx="6"/>

  <!-- ── Title / User Prompt ── -->
  <rect x="200" y="18" width="600" height="48" rx="7" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.4"/>
  <text x="500" y="38" text-anchor="middle" font-size="11" fill="#1a1a2e" font-weight="600">User Prompt</text>
  <text x="500" y="56" text-anchor="middle" font-size="10" fill="#444">"Run the CDSS pipeline. Patient FHIR ID is patient-marcus-webb"</text>

  <!-- Arrow prompt → ADK -->
  <line x1="500" y1="66" x2="500" y2="90" stroke="#555" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- ── ADK Web Server ── -->
  <rect x="160" y="90" width="680" height="54" rx="7" fill="#1a1a2e" stroke="#4a90d9" stroke-width="1.4"/>
  <text x="500" y="112" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">ADK Web Server  (Uvicorn / FastAPI · http://127.0.0.1:8000)</text>
  <text x="500" y="132" text-anchor="middle" font-size="10.5" fill="#a8c8f0">cdss_agent — Root Agent  ·  gemini-2.5-flash  ·  Vertex AI (us-central1)</text>

  <!-- Arrow ADK → PubSub -->
  <line x1="500" y1="144" x2="500" y2="172" stroke="#555" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- ── Pub/Sub ── -->
  <rect x="200" y="172" width="600" height="72" rx="7" fill="#fff8ee" stroke="#f5a623" stroke-width="1.4"/>
  <text x="500" y="194" text-anchor="middle" font-size="11" fill="#b35c00" font-weight="700" letter-spacing="1">GOOGLE CLOUD PUB/SUB</text>
  <text x="500" y="212" text-anchor="middle" font-size="10" fill="#6b4400">patient-context-ready · diagnosis-ready · protocols-ready</text>
  <text x="500" y="228" text-anchor="middle" font-size="10" fill="#6b4400">drug-interactions-ready · audit-events</text>

  <!-- Step labels above agent boxes -->
  <text x="116" y="276" text-anchor="middle" font-size="9.5" fill="#777" font-style="italic">STEP 1</text>
  <text x="295" y="270" text-anchor="middle" font-size="9.5" fill="#777" font-style="italic">STEP 2</text>
  <text x="295" y="282" text-anchor="middle" font-size="9" fill="#aaa">(parallel)</text>
  <text x="500" y="270" text-anchor="middle" font-size="9.5" fill="#777" font-style="italic">STEP 2</text>
  <text x="500" y="282" text-anchor="middle" font-size="9" fill="#aaa">(parallel)</text>
  <text x="695" y="276" text-anchor="middle" font-size="9.5" fill="#777" font-style="italic">STEP 3</text>
  <text x="878" y="276" text-anchor="middle" font-size="9.5" fill="#f5a623" font-style="italic">STEP 4</text>

  <!-- Fan-out lines PubSub → agents -->
  <line x1="270" y1="244" x2="116" y2="244" stroke="#f5a623" stroke-width="1.2"/>
  <line x1="116" y1="244" x2="116" y2="292" stroke="#f5a623" stroke-width="1.2" marker-end="url(#arrowOrange)"/>

  <line x1="340" y1="244" x2="295" y2="244" stroke="#f5a623" stroke-width="1.2"/>
  <line x1="295" y1="244" x2="295" y2="292" stroke="#f5a623" stroke-width="1.2" marker-end="url(#arrowOrange)"/>

  <line x1="500" y1="244" x2="500" y2="292" stroke="#f5a623" stroke-width="1.2" marker-end="url(#arrowOrange)"/>

  <line x1="620" y1="244" x2="695" y2="244" stroke="#f5a623" stroke-width="1.2"/>
  <line x1="695" y1="244" x2="695" y2="292" stroke="#f5a623" stroke-width="1.2" marker-end="url(#arrowOrange)"/>

  <!-- ── Agent boxes row ── -->
  <!-- Patient Context -->
  <rect x="52" y="292" width="128" height="86" rx="6" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.4"/>
  <text x="116" y="315" text-anchor="middle" font-size="10.5" fill="#1a1a2e" font-weight="600">Patient</text>
  <text x="116" y="330" text-anchor="middle" font-size="10.5" fill="#1a1a2e" font-weight="600">Context Agent</text>
  <text x="116" y="349" text-anchor="middle" font-size="9.5" fill="#555">FHIR R4</text>
  <text x="116" y="364" text-anchor="middle" font-size="9" fill="#888">DLP Moment 1</text>
  <text x="116" y="374" text-anchor="middle" font-size="9" fill="#888"> </text>

  <!-- Diagnosis -->
  <rect x="227" y="292" width="136" height="86" rx="6" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.4"/>
  <text x="295" y="315" text-anchor="middle" font-size="10.5" fill="#1a1a2e" font-weight="600">Diagnosis</text>
  <text x="295" y="330" text-anchor="middle" font-size="10.5" fill="#1a1a2e" font-weight="600">Agent</text>
  <text x="295" y="349" text-anchor="middle" font-size="9.5" fill="#555">Gemini 2.5 Flash</text>
  <text x="295" y="364" text-anchor="middle" font-size="9" fill="#888">DLP Moment 2</text>
  <text x="295" y="374" text-anchor="middle" font-size="9" fill="#888"> </text>

  <!-- Protocol Lookup -->
  <rect x="428" y="292" width="144" height="86" rx="6" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.4"/>
  <text x="500" y="315" text-anchor="middle" font-size="10.5" fill="#1a1a2e" font-weight="600">Protocol</text>
  <text x="500" y="330" text-anchor="middle" font-size="10.5" fill="#1a1a2e" font-weight="600">Lookup Agent</text>
  <text x="500" y="349" text-anchor="middle" font-size="9.5" fill="#555">Vertex AI Search</text>
  <text x="500" y="364" text-anchor="middle" font-size="9" fill="#888">10 protocols</text>
  <text x="500" y="374" text-anchor="middle" font-size="9" fill="#888"> </text>

  <!-- Drug Interaction -->
  <rect x="626" y="292" width="138" height="86" rx="6" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.4"/>
  <text x="695" y="315" text-anchor="middle" font-size="10.5" fill="#1a1a2e" font-weight="600">Drug</text>
  <text x="695" y="330" text-anchor="middle" font-size="10.5" fill="#1a1a2e" font-weight="600">Interaction Agent</text>
  <text x="695" y="349" text-anchor="middle" font-size="9.5" fill="#555">RxNorm + FHIR</text>
  <text x="695" y="364" text-anchor="middle" font-size="9" fill="#888">Allergy / K⁺ checks</text>
  <text x="695" y="374" text-anchor="middle" font-size="9" fill="#888"> </text>

  <!-- Convergence lines → Orchestrator -->
  <line x1="116" y1="378" x2="116" y2="442" stroke="#4a90d9" stroke-width="1.2"/>
  <line x1="295" y1="378" x2="295" y2="442" stroke="#4a90d9" stroke-width="1.2"/>
  <line x1="500" y1="378" x2="500" y2="442" stroke="#4a90d9" stroke-width="1.2"/>
  <line x1="695" y1="378" x2="695" y2="442" stroke="#4a90d9" stroke-width="1.2"/>
  <line x1="116" y1="442" x2="695" y2="442" stroke="#4a90d9" stroke-width="1.2"/>
  <line x1="405" y1="442" x2="405" y2="472" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- ── Orchestrator ── -->
  <rect x="248" y="472" width="316" height="94" rx="6" fill="#1a1a2e" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="406" y="494" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">Orchestrator Agent  (Step 4)</text>
  <text x="406" y="512" text-anchor="middle" font-size="10" fill="#a8c8f0">Gemini 2.5 Flash synthesis · google.genai SDK</text>
  <text x="406" y="529" text-anchor="middle" font-size="10" fill="#a8c8f0">DLP Moment 3 · Firestore · BigQuery</text>
  <text x="406" y="546" text-anchor="middle" font-size="10" fill="#a8c8f0">CDSSummary → cds_sessions/{session_id}</text>
  <text x="406" y="562" text-anchor="middle" font-size="9.5" fill="#6a9fd8">audit-events →</text>

  <!-- Audit Agent (right) -->
  <line x1="878" y1="244" x2="878" y2="586" stroke="#f5a623" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="878" y1="586" x2="812" y2="586" stroke="#f5a623" stroke-width="1.2" marker-end="url(#arrowOrange)"/>

  <!-- Orchestrator → Audit arrow -->
  <line x1="564" y1="526" x2="720" y2="586" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── Audit Agent ── -->
  <rect x="718" y="556" width="218" height="98" rx="6" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.4"/>
  <text x="827" y="578" text-anchor="middle" font-size="11" fill="#1a1a2e" font-weight="600">Audit Agent  (Step 5)</text>
  <text x="827" y="596" text-anchor="middle" font-size="10" fill="#444">consecutive_timeouts ≤ 3</text>
  <text x="827" y="612" text-anchor="middle" font-size="10" fill="#444">5 events per session</text>
  <text x="827" y="628" text-anchor="middle" fill="#e05555" font-size="9.5">→ Cloud Logging · BigQuery</text>
  <text x="827" y="642" text-anchor="middle" font-size="9" fill="#888"> </text>

  <!-- ── Persistence row ── -->
  <line x1="316" y1="566" x2="130" y2="614" stroke="#4caf50" stroke-width="1.2" marker-end="url(#arrowGreen)"/>
  <line x1="406" y1="566" x2="310" y2="614" stroke="#4caf50" stroke-width="1.2" marker-end="url(#arrowGreen)"/>
  <line x1="480" y1="566" x2="490" y2="614" stroke="#4caf50" stroke-width="1.2" marker-end="url(#arrowGreen)"/>

  <!-- Firestore -->
  <rect x="60" y="614" width="152" height="52" rx="5" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.4"/>
  <text x="136" y="636" text-anchor="middle" font-size="10.5" fill="#1b5e20" font-weight="600">Firestore</text>
  <text x="136" y="652" text-anchor="middle" font-size="9.5" fill="#388e3c">cds_sessions/</text>
  <text x="136" y="662" text-anchor="middle" font-size="9" fill="#555">CDSSummary docs</text>

  <!-- BigQuery -->
  <rect x="232" y="614" width="160" height="52" rx="5" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.4"/>
  <text x="312" y="636" text-anchor="middle" font-size="10.5" fill="#1b5e20" font-weight="600">BigQuery</text>
  <text x="312" y="652" text-anchor="middle" font-size="9.5" fill="#388e3c">cdss_audit</text>
  <text x="312" y="662" text-anchor="middle" font-size="9" fill="#555">audit_events · summaries</text>

  <!-- Cloud Logging -->
  <rect x="412" y="614" width="160" height="52" rx="5" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.4"/>
  <text x="492" y="636" text-anchor="middle" font-size="10.5" fill="#1b5e20" font-weight="600">Cloud Logging</text>
  <text x="492" y="652" text-anchor="middle" font-size="9.5" fill="#388e3c">cds-audit-trail</text>
  <text x="492" y="662" text-anchor="middle" font-size="9" fill="#555">Structured audit trail</text>

  <!-- Audit Agent → persistence -->
  <line x1="756" y1="654" x2="620" y2="654" stroke="#e05555" stroke-width="1.2" marker-end="url(#arrowRed)"/>

  <!-- ── Legend ── -->
  <rect x="52" y="648" width="580" height="24" rx="4" fill="#fff" stroke="#dde3ea" stroke-width="1"/>
  <line x1="68" y1="660" x2="92" y2="660" stroke="#4a90d9" stroke-width="1.8"/>
  <text x="98" y="664" font-size="9.5" fill="#555">Agent flow</text>
  <line x1="160" y1="660" x2="184" y2="660" stroke="#f5a623" stroke-width="1.8"/>
  <text x="190" y="664" font-size="9.5" fill="#555">Pub/Sub routing</text>
  <line x1="276" y1="660" x2="300" y2="660" stroke="#f5a623" stroke-width="1.8" stroke-dasharray="4,3"/>
  <text x="306" y="664" font-size="9.5" fill="#555">Async / audit path</text>
  <line x1="400" y1="660" x2="424" y2="660" stroke="#4caf50" stroke-width="1.8"/>
  <text x="430" y="664" font-size="9.5" fill="#555">Persistence write</text>
  <line x1="510" y1="660" x2="534" y2="660" stroke="#e05555" stroke-width="1.8"/>
  <text x="540" y="664" font-size="9.5" fill="#555">Audit write</text>
</svg>
