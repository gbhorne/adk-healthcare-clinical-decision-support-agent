  <text x="149" y="139" text-anchor="middle" fill="#fbbf24" font-size="13">patient-context-ready</text>

  <rect x="278" y="124" width="196" height="20" rx="3" fill="#f5a623" opacity="0.1" stroke="#f5a623" stroke-width="0.8"/>
  <text x="376" y="139" text-anchor="middle" fill="#fbbf24" font-size="13">diagnosis-ready</text>

